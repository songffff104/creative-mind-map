<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创意发散器 V3</title>
    <style>
        /* ================= 视觉风格 ================= */
        :root {
            --bg-color: #ffffff;
            --node-black: #1a1a1a;
            --accent-yellow: #FFD700;
            --glass-bg: rgba(26, 26, 26, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .glass {
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1); color: white;
        }

        #history-panel {
            position: absolute; top: 20px; right: 20px; width: 200px; max-height: 300px;
            border-radius: 16px; padding: 15px; overflow-y: auto; z-index: 100;
        }
        #history-panel h3 { margin: 0 0 10px 0; font-size: 14px; color: var(--accent-yellow); }
        #history-list { list-style: none; padding: 0; margin: 0; font-size: 12px; }
        #history-list li { margin-bottom: 5px; opacity: 0.8; }

        #settings-btn {
            position: absolute; top: 20px; left: 20px; padding: 10px 15px; border-radius: 12px;
            cursor: pointer; z-index: 100; font-size: 14px; border: none; font-weight: bold;
            background: var(--node-black); color: white; transition: 0.3s;
        }
        #settings-btn:hover { background: var(--accent-yellow); color: var(--node-black); }
        
        #settings-modal {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; padding: 20px; border-radius: 16px; z-index: 200; text-align: center;
        }
        #settings-modal input {
            width: 90%; padding: 10px; margin: 15px 0; border-radius: 8px; border: none; outline: none;
        }
        #settings-modal button {
            padding: 8px 20px; border-radius: 8px; border: none; cursor: pointer;
            background: var(--accent-yellow); color: var(--node-black); font-weight: bold;
        }
        #overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.7); backdrop-filter: blur(5px); z-index: 150;
        }

        #input-wrapper {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            border-radius: 50px; padding: 5px 20px; display: flex; align-items: center; z-index: 100;
        }
        #main-input {
            background: transparent; border: none; color: white; font-size: 16px; outline: none; width: 300px; padding: 10px;
        }
        #main-input::placeholder { color: rgba(255,255,255,0.6); }

        #canvas-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .line { stroke: #d0d0d0; stroke-width: 2; transition: stroke 0.3s; }

        #nodes-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        .node {
            position: absolute; color: white; border-radius: 50%; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transform: translate(-50%, -50%);
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.15); transition: all 0.3s ease;
            text-align: center; padding: 10px; word-wrap: break-word;
        }
        .node:hover { transform: translate(-50%, -50%) scale(1.05); box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
        .node-zh { font-weight: bold; font-size: 14px; line-height: 1.2; }
        .node-en { font-size: 10px; opacity: 0.85; margin-top: 4px; line-height: 1.1; }

        .node.normal { width: 80px; height: 80px; }
        .node.large { width: 110px; height: 110px; }
        .node.large .node-zh { font-size: 18px; }
        .node.large .node-en { font-size: 12px; }
        .node.selected { border: 4px solid var(--accent-yellow); transform: translate(-50%, -50%) scale(1.1); }

        #loading-indicator {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            color: var(--node-black); font-size: 14px; font-weight: bold; display: none; z-index: 100;
            animation: breathe 1.5s infinite ease-in-out alternate;
        }
        @keyframes breathe { 0% { opacity: 0.3; } 100% { opacity: 1; } }

    </style>
</head>
<body>

    <svg id="canvas-svg"></svg>
    <div id="nodes-container"></div>

    <button id="settings-btn">⚙️ 设置 API Key</button>
    <div id="overlay"></div>
    <div id="settings-modal" class="glass">
        <h3 style="margin-top:0;">配置 Gemini API Key</h3>
        <p style="font-size:12px; opacity:0.8; margin-bottom:5px;">Key 会保存在本地</p>
        <input type="password" id="api-key-input" placeholder="粘贴你的 API Key 到这里...">
        <button onclick="saveApiKey()">保存并关闭</button>
    </div>

    <div id="history-panel" class="glass">
        <h3>历史记录</h3>
        <ul id="history-list"></ul>
    </div>

    <div id="input-wrapper" class="glass">
        <input type="text" id="main-input" placeholder="输入灵感 (回车确认)..." autocomplete="off">
    </div>

    <div id="loading-indicator">正在与 Gemini 连接思维...</div>

    <script>
        const colorPalette = [
            '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#D4A5A5', 
            '#9B59B6', '#3498DB', '#E67E22', '#2ECC71', '#F39C12',
            '#1abc9c', '#e74c3c', '#8e44ad', '#2c3e50', '#d35400'
        ];

        let nodes = [];
        let links = [];
        let selectedNodeId = null;
        let nodeIdCounter = 0;

        const container = document.getElementById('nodes-container');
        const svgCanvas = document.getElementById('canvas-svg');
        const inputField = document.getElementById('main-input');
        const historyList = document.getElementById('history-list');
        const loadingIndicator = document.getElementById('loading-indicator');

        // ================= API Key 管理 =================
        const settingsBtn = document.getElementById('settings-btn');
        const settingsModal = document.getElementById('settings-modal');
        const overlay = document.getElementById('overlay');
        const apiKeyInput = document.getElementById('api-key-input');

        settingsBtn.onclick = () => {
            apiKeyInput.value = localStorage.getItem('gemini_api_key') || '';
            settingsModal.style.display = 'block'; overlay.style.display = 'block';
        };

        function saveApiKey() {
            const key = apiKeyInput.value.trim();
            if(key) {
                localStorage.setItem('gemini_api_key', key);
                settingsModal.style.display = 'none'; overlay.style.display = 'none';
            } else { alert("API Key 不能为空"); }
        }

        function getApiKey() { return localStorage.getItem('gemini_api_key'); }

        // ================= 核心交互 =================
        inputField.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && inputField.value.trim() !== '') {
                if(!getApiKey()) {
                    alert("请先点击左上角设置 API Key！"); settingsBtn.click(); return;
                }
                const text = inputField.value.trim();
                inputField.value = ''; 
                await handleNewInput(text);
            }
        });
