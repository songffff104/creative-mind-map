  <script>
    const DEFAULT_MODEL = 'gemini-2.5-flash';
    const colorPalette = ['#FFB7B2', '#FFDAC1', '#E2F0CB', '#B5EAD7', '#C7CEEA', '#BDE0FE', '#A2D2FF', '#FFE5D9'];

    let nodes = [];
    let links = [];
    let collectedWords = new Set();
    let nodeIdCounter = 0;
    let currentScale = 1;
    let isDragging = false;
    let draggedNode = null;
    let startX = 0;
    let startY = 0;
    let dragMoved = false;

    const container = document.getElementById('nodes-container');
    const zoomContainer = document.getElementById('zoom-container');
    const svgCanvas = document.getElementById('canvas-svg');
    const inputField = document.getElementById('main-input');
    const statusIndicator = document.getElementById('status-indicator');
    const overlay = document.getElementById('overlay');
    const documentModal = document.getElementById('document-modal');

    function openSettings() {
      document.getElementById('api-key-input').value = localStorage.getItem('gemini_api_key') || '';
      document.getElementById('settings-modal').style.display = 'block';
      overlay.style.display = 'block';
    }

    function saveApiKey() {
      const key = document.getElementById('api-key-input').value.trim();
      if (key) {
        localStorage.setItem('gemini_api_key', key);
      } else {
        localStorage.removeItem('gemini_api_key');
      }
      document.getElementById('settings-modal').style.display = 'none';
      overlay.style.display = 'none';
    }

    function hideFloatingPanels() {
      document.getElementById('history-panel').style.display = 'none';
      document.getElementById('collection-panel').style.display = 'none';
    }

    function toggleHistoryPanel() {
      const panel = document.getElementById('history-panel');
      const isOpen = panel.style.display === 'block';
      hideFloatingPanels();
      panel.style.display = isOpen ? 'none' : 'block';
    }

    function toggleCollectionPanel() {
      const panel = document.getElementById('collection-panel');
      const isOpen = panel.style.display === 'block';
      hideFloatingPanels();
      panel.style.display = isOpen ? 'none' : 'block';
    }

    function scaleGraph(factor) {
      currentScale = Math.min(Math.max(currentScale * factor, 0.4), 3);
      zoomContainer.style.transform = `scale(${currentScale})`;
    }

    function showLoading(text, show) {
      statusIndicator.innerText = text;
      statusIndicator.style.display = show ? 'block' : 'none';
    }

    function createNode(zhText, enText, x, y, isLarge, color, isCentral) {
      const id = nodeIdCounter++;
      nodes.push({ id, zh: zhText, en: enText, x, y, isLarge, color, isCentral });
      return id;
    }

    function createLink(sourceId, targetId) {
      links.push({ source: sourceId, target: targetId });
    }

    function clearCanvas() {
      nodes = [];
      links = [];
      collectedWords.clear();
      updateCollectionUI();
      container.innerHTML = '';
      svgCanvas.innerHTML = '';
    }

    function renderLinks() {
      svgCanvas.innerHTML = '';
      for (const link of links) {
        const source = nodes.find(n => n.id === link.source);
        const target = nodes.find(n => n.id === link.target);
        if (!source || !target) continue;

        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', source.x);
        line.setAttribute('y1', source.y);
        line.setAttribute('x2', target.x);
        line.setAttribute('y2', target.y);
        line.setAttribute('class', 'mind-edge');
        svgCanvas.appendChild(line);
      }
    }

    function createNodeContent(div, node) {
      div.innerHTML = '';
      const zh = document.createElement('span');
      zh.className = 'node-zh';
      zh.textContent = node.zh;
      const en = document.createElement('span');
      en.className = 'node-en';
      en.textContent = node.en;
      div.appendChild(zh);
      div.appendChild(en);
    }

    function renderNodes() {
      for (const node of nodes) {
        let div = document.getElementById(`node-${node.id}`);
        if (!div) {
          div = document.createElement('div');
          div.id = `node-${node.id}`;
          createNodeContent(div, node);
          div.addEventListener('click', () => {
            if (!dragMoved) onNodeClick(node.id, node.zh);
          });
          div.addEventListener('contextmenu', (e) => onNodeRightClick(e, node.id));
          container.appendChild(div);
        } else {
          createNodeContent(div, node);
        }

        div.className = `mind-node ${node.isCentral ? 'central' : 'normal'}`;

        if (collectedWords.has(node.zh)) {
          div.classList.add('collected');
          div.style.backgroundColor = '';
          div.style.border = '';
        } else {
          div.classList.remove('collected');
          if (node.isCentral) {
            div.style.backgroundColor = node.color;
            div.style.border = 'none';
          } else {
            div.style.backgroundColor = '#fff';
            div.style.border = `2px solid ${node.color}`;
          }
        }

        div.style.left = `${node.x}px`;
        div.style.top = `${node.y}px`;
      }

      renderLinks();
    }

    function updateCollectionUI() {
      document.getElementById('collection-badge').innerText = String(collectedWords.size);
      const list = document.getElementById('collection-list');
      if (collectedWords.size === 0) {
        list.innerHTML = '<p style="font-size:12px;color:#888;margin:10px 0;">右键点击画布上的任意词语即可收集。</p>';
        return;
      }

      list.innerHTML = '';
      for (const word of collectedWords) {
        const li = document.createElement('li');
        li.textContent = word;
        list.appendChild(li);
      }
    }

    function onNodeRightClick(e, nodeId) {
      e.preventDefault();
      const node = nodes.find(n => n.id === nodeId);
      if (!node) return;

      if (collectedWords.has(node.zh)) {
        collectedWords.delete(node.zh);
      } else {
        collectedWords.add(node.zh);
      }

      updateCollectionUI();
      renderNodes();
    }

    function extractTextFromResponse(data) {
      const candidate = data?.candidates?.[0];
      if (!candidate?.content?.parts?.length) return '';
      return candidate.content.parts
        .map(part => part.text || '')
        .join('')
        .trim();
    }

    function safeJsonParse(raw) {
      const text = String(raw || '').trim();
      try {
        return JSON.parse(text);
      } catch {
        const cleaned = text
          .replace(/^```json\s*/i, '')
          .replace(/^```\s*/i, '')
          .replace(/```$/i, '')
          .trim();
        return JSON.parse(cleaned);
      }
    }

    async function callGeminiAPI(prompt, expectJson = false) {
      const userKey = (localStorage.getItem('gemini_api_key') || '').trim();
      if (!userKey) {
        throw new Error('缺少 Gemini API Key。请点左上角 ⚙️ 先保存 API Key。');
      }

      const url = `https://generativelanguage.googleapis.com/v1beta/models/${DEFAULT_MODEL}:generateContent?key=${encodeURIComponent(userKey)}`;
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: expectJson
          ? {
              responseMimeType: 'application/json',
              temperature: 0.3
            }
          : {
              temperature: 0.7
            }
      };

      const delays = [1000, 2000, 4000];

      for (let i = 0; i <= delays.length; i++) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            const message = data?.error?.message || `HTTP ${response.status}`;
            throw new Error(message);
          }

          const textResp = extractTextFromResponse(data);
          if (!textResp) {
            throw new Error('模型返回为空。');
          }

          return expectJson ? safeJsonParse(textResp) : textResp;
        } catch (err) {
          if (i === delays.length) throw err;
          await new Promise(resolve => setTimeout(resolve, delays[i]));
        }
      }
    }

    async function trigger发散() {
      const text = inputField.value.trim();
      if (!text) return;

      inputField.value = '';
      document.getElementById('history-list').prepend(Object.assign(document.createElement('li'), { innerText: text }));
      clearCanvas();
      inputField.placeholder = '+ 继续输入新的起点...';

      const newNodeId = createNode(text, '...', window.innerWidth / 2, window.innerHeight / 2, true, '#1a1a1a', true);
      renderNodes();

      try {
        showLoading('正在生成中心词翻译...', true);
        const trans = await callGeminiAPI(
          `把“${text}”翻译成简洁英文，返回 JSON：{"zh":"${text}","en":"..."}`,
          true
        );

        const targetNode = nodes.find(n => n.id === newNodeId);
        if (targetNode && trans?.en) {
          targetNode.en = trans.en;
          renderNodes();
        }
      } catch (error) {
        console.error(error);
        alert(`初始化失败：${error.message}`);
      } finally {
        showLoading('', false);
      }
    }

    async function onNodeClick(nodeId, text) {
      showLoading('思维发散中...', true);
      try {
        const relatedWords = await callGeminiAPI(
          `你是一个思维发散引擎。请针对“${text}”发散出 6 个具象且有创意的关联词汇。\n返回严格 JSON 数组，例如：[{"zh":"中文","en":"English"}]`,
          true
        );

        if (!Array.isArray(relatedWords) || relatedWords.length === 0) {
          throw new Error('返回的 JSON 不是有效数组。');
        }

        const parentNode = nodes.find(n => n.id === nodeId);
        if (!parentNode) return;

        const radius = 180;
        const angleStep = (2 * Math.PI) / relatedWords.length;
        let currentAngle = Math.random() * Math.PI;

        relatedWords.forEach((wordObj) => {
          const childX = parentNode.x + radius * Math.cos(currentAngle);
          const childY = parentNode.y + radius * Math.sin(currentAngle);
          const randomColor = colorPalette[Math.floor(Math.random() * colorPalette.length)];
          const childId = createNode(wordObj.zh || '未命名', wordObj.en || '', childX, childY, false, randomColor, false);
          createLink(nodeId, childId);
          currentAngle += angleStep;
        });

        renderNodes();
      } catch (error) {
        console.error(error);
        alert(`扩散失败：${error.message}`);
      } finally {
        showLoading('', false);
      }
    }

    async function generateDocument() {
      if (collectedWords.size === 0) {
        alert('请先右键高亮一些灵感词汇！');
        return;
      }

      document.getElementById('collection-panel').style.display = 'none';
      showLoading('正在为您编织创意企划，请稍候...', true);
      overlay.style.display = 'block';

      const prompt = `我正在头脑风暴，挑选了核心词：【${Array.from(collectedWords).join('、')}】。请写一份结构完整的《创意企划概念案》，包含：\n1. 方案命名\n2. 核心概念\n3. 灵感串联解析\n4. 落地应用场景\n直接输出排版清晰的文章。`;

      try {
        document.getElementById('doc-content').innerText = await callGeminiAPI(prompt, false);
        documentModal.style.display = 'flex';
      } catch (error) {
        console.error(error);
        alert(`文档生成失败：${error.message}`);
        overlay.style.display = 'none';
      } finally {
        showLoading('', false);
      }
    }

    function closeDocumentModal() {
      documentModal.style.display = 'none';
      overlay.style.display = 'none';
    }

    async function copyDocument() {
      const text = document.getElementById('doc-content').innerText;
      try {
        await navigator.clipboard.writeText(text);
        alert('✅ 已复制到剪贴板！');
      } catch {
        const textArea = document.createElement('textarea');
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          alert('✅ 已复制到剪贴板！');
        } catch {
          alert('复制失败，请手动选中复制。');
        }
        document.body.removeChild(textArea);
      }
    }

    document.getElementById('settings-btn').onclick = openSettings;
    document.getElementById('save-api-btn').onclick = saveApiKey;
    document.getElementById('history-btn').onclick = toggleHistoryPanel;
    document.getElementById('collection-btn').onclick = toggleCollectionPanel;
    document.getElementById('scale-in').onclick = () => scaleGraph(1.1);
    document.getElementById('scale-out').onclick = () => scaleGraph(0.9);
    document.getElementById('input-wand').onclick = trigger发散;
    document.getElementById('generate-doc-btn').onclick = generateDocument;
    document.getElementById('close-doc-btn').onclick = closeDocumentModal;
    document.getElementById('copy-doc-btn').onclick = copyDocument;
    inputField.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') trigger发散();
    });
    overlay.addEventListener('click', () => {
      document.getElementById('settings-modal').style.display = 'none';
      closeDocumentModal();
    });

    document.addEventListener('mousedown', (e) => {
      const nodeEl = e.target.closest('.mind-node');
      if (!nodeEl) return;
      isDragging = true;
      dragMoved = false;
      draggedNode = nodeEl;
      startX = e.clientX;
      startY = e.clientY;
      draggedNode.dataset.initX = parseFloat(draggedNode.style.left);
      draggedNode.dataset.initY = parseFloat(draggedNode.style.top);
      draggedNode.classList.add('dragging');
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging || !draggedNode) return;
      const dx = (e.clientX - startX) / currentScale;
      const dy = (e.clientY - startY) / currentScale;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true;

      const newX = parseFloat(draggedNode.dataset.initX) + dx;
      const newY = parseFloat(draggedNode.dataset.initY) + dy;
      draggedNode.style.left = `${newX}px`;
      draggedNode.style.top = `${newY}px`;

      const nodeObj = nodes.find(n => n.id === parseInt(draggedNode.id.split('-')[1], 10));
      if (nodeObj) {
        nodeObj.x = newX;
        nodeObj.y = newY;
      }

      renderLinks();
    });

    document.addEventListener('mouseup', () => {
      if (isDragging && draggedNode) {
        draggedNode.classList.remove('dragging');
      }
      setTimeout(() => {
        dragMoved = false;
      }, 0);
      draggedNode = null;
      isDragging = false;
    });
  </script>
