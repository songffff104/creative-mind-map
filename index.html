<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创意发散器 V4 (灵感结晶版)</title>
    <style>
        /* ================= 视觉风格 V4 ================= */
        :root {
            --bg-color: #ffffff;
            --text-dark: #333333;
            --line-gray: #d0d0d0;
            --accent-yellow: #FFD700;
            --node-shadow: 0 4px 15px rgba(0,0,0,0.1);
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; user-select: none;
        }

        .glass {
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05); color: var(--text-dark);
        }

        #graph-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
            transform-origin: 0 0; cursor: grab;
        }
        #graph-container.dragging { cursor: grabbing; }

        #canvas-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;}
        .mind-edge { stroke: var(--line-gray); stroke-width: 1.5; transition: stroke 0.3s; }

        #nodes-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
        .mind-node {
            position: absolute; background-color: var(--bg-color); color: var(--text-dark); border-radius: 50%; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transform: translate(-50%, -50%);
            cursor: pointer; box-shadow: var(--node-shadow); transition: all 0.3s ease, transform 0s, left 0s, top 0s;
            text-align: center; padding: 10px; word-wrap: break-word;
        }
        .mind-node:hover { transform: translate(-50%, -50%) scale(1.03); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .mind-node.dragging { cursor: grabbing; box-shadow: 0 12px 35px rgba(0,0,0,0.2); }
        
        .node-zh { font-weight: bold; font-size: 14px; line-height: 1.2; }
        .node-en { font-size: 10px; opacity: 0.85; margin-top: 4px; line-height: 1.1; }

        .mind-node.central { width: 110px; height: 110px; font-size: 18px; }
        .mind-node.central .node-zh { font-size: 18px; }
        .mind-node.central .node-en { font-size: 12px; }
        .mind-node.normal { width: 80px; height: 80px; }
        .mind-node.expanded { border: 3px solid var(--text-dark); box-shadow: 0 0 15px rgba(0,0,0,0.2); }
        
        /* 收集状态：明黄高亮 */
        .mind-node.collected { 
            background-color: var(--accent-yellow) !important; color: var(--text-dark) !important; 
            border: none !important; box-shadow: 0 0 20px rgba(255, 215, 0, 0.6) !important; 
        }

        /* ================= 界面控件 ================= */
        #bottom-toolbar {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: clamp(350px, 80%, 700px); display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        #input-wrapper-v3 {
            border-radius: 50px; padding: 5px 20px; display: flex; align-items: center; flex: 1; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #input-plus { color: #888; font-size: 20px; margin-right: 15px; }
        #main-input { background: transparent; border: none; color: var(--text-dark); font-size: 16px; outline: none; flex: 1; padding: 10px; }
        #main-input::placeholder { color: #888; }
        #input-buttons { display: flex; gap: 10px; }
        .input-icon-btn {
            background: var(--accent-yellow); color: var(--text-dark); border: none; border-radius: 50%; 
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; font-size: 18px;
        }
        .input-icon-btn:hover { transform: scale(1.1); }
        .input-icon-btn.secondary { background: var(--bg-color); box-shadow: 0 2px 8px rgba(0,0,0,0.05); color: #888; }
        .input-icon-btn.secondary:hover { color: var(--text-dark); background: var(--bg-color); }

        .glass-btn {
            background: var(--glass-bg); backdrop-filter: blur(8px); border: 1px solid var(--glass-border);
            color: #888; box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: 0.3s;
            width: 40px; height: 40px; border-radius: 12px; cursor: pointer; z-index: 100; font-size: 18px; border: none; font-weight: bold;
            display: flex; align-items: center; justify-content: center; position: absolute;
        }
        .glass-btn:hover { color: var(--text-dark); background: rgba(255, 255, 255, 0.6); }

        #settings-btn { top: 20px; left: 20px; }
        #history-btn { top: 20px; right: 20px; }
        
        /* 收集箱按钮 */
        #collection-btn { top: 70px; right: 20px; position: absolute; width: auto; padding: 0 15px; gap: 5px; }
        #collection-badge { background: var(--accent-yellow); color: var(--text-dark); border-radius: 50%; width: 20px; height: 20px; font-size: 12px; display: flex; align-items: center; justify-content: center; }

        #scale-control { position: absolute; bottom: 40px; left: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        .scale-btn { position: relative; top: 0; left: 0; }

        #status-indicator {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 8px 15px; border-radius: 50px; font-size: 12px; font-weight: bold; display: none; z-index: 100;
            background: var(--accent-yellow); color: var(--text-dark);
            animation: breathe 1.5s infinite ease-in-out alternate;
        }
        @keyframes breathe { 0% { opacity: 0.5; } 100% { opacity: 1; } }

        /* 面板通用 */
        .panel {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px; border-radius: 16px; z-index: 200;
        }
        #settings-modal, #history-panel, #collection-panel { width: 300px; text-align: center; }
        #settings-modal input { width: 90%; padding: 10px; margin: 15px 0; border-radius: 8px; border: none; outline: none; }
        .primary-btn {
            padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; width: 100%;
            background: var(--accent-yellow); color: var(--text-dark); font-weight: bold; font-size: 14px; transition: 0.3s;
        }
        .primary-btn:hover { box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4); transform: translateY(-2px); }

        /* 历史与收集箱位置修正 */
        #history-panel { top: 70px; right: 70px; left: auto; transform: none; width: 200px; max-height: 300px; overflow-y: auto; text-align: left; }
        #collection-panel { top: 120px; right: 20px; left: auto; transform: none; width: 220px; max-height: 400px; overflow-y: auto; text-align: left; }
        
        .panel h3 { margin: 0 0 10px 0; font-size: 14px; color: #888; }
        .list-container { list-style: none; padding: 0; margin: 0; font-size: 13px; margin-bottom: 15px; }
        .list-container li { margin-bottom: 8px; padding: 5px 8px; background: rgba(0,0,0,0.03); border-radius: 6px; display: inline-block; margin-right: 5px; border: 1px solid rgba(0,0,0,0.05);}

        /* 最终文档展示大面板 */
        #document-modal {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: clamp(300px, 80%, 700px); max-height: 80vh; padding: 30px; border-radius: 20px; z-index: 300;
            display: flex; flex-direction: column; gap: 15px; background: var(--bg-color); border: 1px solid var(--line-gray);
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }
        #doc-content {
            flex: 1; overflow-y: auto; font-size: 15px; line-height: 1.6; color: var(--text-dark);
            white-space: pre-wrap; padding: 10px; background: rgba(0,0,0,0.02
